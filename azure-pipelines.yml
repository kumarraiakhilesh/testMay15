
trigger: none

pool:
  name: Huawei

variables:
  terraformVersion: 'latest'

stages:

# ================= INIT + VALIDATE + PLAN =================
- stage: Terraform_Plan
  displayName: "Terraform Init, Validate, Plan"
  jobs:
  - job: Plan
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'Huawei_services'
        backendAzureRmResourceGroupName: 'Rg15may'
        backendAzureRmStorageAccountName: 'test15st'
        backendAzureRmContainerName: 'may15cont'
        backendAzureRmKey: 'tfstate'

    - task: TerraformTask@5
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'Huawei_services'

# ================= SECURITY SCAN =================
- stage: Security_Scan
  displayName: "Terraform Security Scan"
  dependsOn: Terraform_Plan
  jobs:
  - job: Scan
    steps:

    - script: |
        pip install checkov
        checkov -d .
      displayName: "Run Checkov Scan"

# ================= APPLY (AUTO APPROVE) =================
- stage: Terraform_Apply
  displayName: "Terraform Apply Auto Approve"
  dependsOn: Security_Scan
  condition: succeeded()
  jobs:
  - job: Apply
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTask@5
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'Huawei_services'
        args: '-auto-approve'