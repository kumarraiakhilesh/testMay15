trigger: none

pool:
  name: Huawei

variables:
  terraformVersion: 'latest'

stages:

# ================= INIT + VALIDATE + PLAN =================
- stage: Plan
  displayName: "Terraform Init Validate Plan"
  jobs:
  - job: plan_job
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'Huawei_services'
        backendAzureRmResourceGroupName: 'Rg15may'
        backendAzureRmStorageAccountName: 'test15st'
        backendAzureRmContainerName: 'may15cont'
        backendAzureRmKey: 'tfstate'

    - task: TerraformTask@5
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'Huawei_services'

# ================= APPLY AUTO APPROVE =================
- stage: Apply
  displayName: "Terraform Apply Auto Approve"
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - job: apply_job
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTask@5
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'Huawei_services'
        args: '-auto-approve'